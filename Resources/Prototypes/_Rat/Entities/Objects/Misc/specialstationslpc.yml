# Event Stations & Motherships

# SRM

- type: entity
  parent: BaseItem
  id: ShipVoucherEventStationSRM
  name: SRM 'The Refugee' station LPC fabprint disk
  description: An LPC fabprint disk loaded with a SRM Great Hunt "Refugee". Has to be redeemed at a shipyard console.
  components:
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Crescent/Objects/Misc/lpcchip.rsi
    layers:
    - state: icon
  - type: StaticPrice
    price: 10
  - type: ShipVoucher
    ship: Refuge

