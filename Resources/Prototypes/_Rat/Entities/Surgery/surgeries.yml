- type: entity
  parent: SurgeryBase
  id: SurgeryInsertSpine
  name: Install Spine Cybernetic
  categories: [ HideSpawnMenu ]
  components:
  - type: Surgery
    requirement: SurgeryOpenIncision
    steps:
    - SurgeryStepInsertCybernetic
    - SurgeryStepSealOrganWound
  - type: SurgeryPartCondition
    part: Torso
  - type: SurgeryOrganCondition
    organ:
    - type: Spine
    inverse: true
    reattaching: true
    slotId: spine

- type: entity
  parent: SurgeryBase
  id: SurgeryRemoveSpine
  name: Remove Spine Cybernetic
  categories: [ HideSpawnMenu ]
  components:
  - type: Surgery
    requirement: SurgeryOpenIncision
    steps:
    - SurgeryStepClampInternalBleeders
    - SurgeryStepRemoveOrgan
  - type: SurgeryPartCondition
    part: Torso
  - type: SurgeryOrganCondition
    organ:
    - type: Spine
    slotId: spine