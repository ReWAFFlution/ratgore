  - uid: 1208
    components:
    - type: Transform
      pos: 7.535639,-23.352873
      parent: 1
    - type: Paper
      content: >-
        From: Regiment Battalion Engineering Corps


        Sir,


        I do not wish to speak poorly, but given our trust, I must be honest. Keeping this rusted wreck running is a miracle — the ship is literally falling apart. Supplies have been scarce, the same engine oil has circulated far too long, and much of the vessel has rusted and become filthy. Some of the weapons are also corroded; we emptied them to remove the rust. Be sure to reload before battle.


        To improve your survival chances in the upcoming engagements, we relocated the bridge to a more secure position. The move was rushed, however, and some prisoners have already turned the old bridge into a makeshift bar.


        Please excuse the ship’s shortcomings. The prisoners we carry must either reach redemption soon, or we must reach our destination before they worsen the situation.


        For the Kaiser!
  - uid: 1209
    components:
